<!DOCTYPE html>
<html>
    <head>
        <title>Repaso — Buenas Prácticas</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>

    <div class="contenedor">

        <!-- ✅ Etiqueta h1 correctamente cerrada -->
        <h1>Buenas Prácticas en HTML</h1>

        <!-- ✅ Imagen con atributo alt descriptivo -->
        <img src="https://ieec.edu.ar/wp-content/uploads/Tilde-Buenas-Pr%C3%A1cticas-300x202.jpg" alt="Imagen de ejemplo de buenas prácticas">

        <!-- ✅ Estilos movidos a styles.css, no inline -->
        <p class="destacado">Separar HTML y CSS es una buena práctica fundamental.</p>

        <!-- ✅ Enlace que abre en pestaña nueva -->
        <a href="https://validator.w3.org" target="_blank">Validar mi HTML</a>

        <!-- ✅ Lista ordenada con buenas prácticas del curso -->
        <ol>
            <li>Siempre cerrar las etiquetas HTML</li>
            <li>Incluir el atributo alt en todas las imágenes</li>
            <li>Separar los estilos en un archivo styles.css</li>
        </ol>

    </div>

    </body>
</html>
