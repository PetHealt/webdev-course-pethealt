<!DOCTYPE html>
<html>
  <head>
    <!-- El head contiene información sobre la página, no se muestra en pantalla -->
    <title>Estructura HTML</title>
  </head>
  <body>
    <!-- El body contiene todo lo que se ve en el navegador -->

    <!-- h1: encabezado principal, solo debe haber uno por página -->
    <h1>Mi página personal</h1>

    <!-- h2: encabezado secundario, puede haber varios -->
    <h2>Bienvenidos</h2>

    <!-- p: párrafo de texto -->
    <p>Hola, me llamo Ana y tengo 15 años. Esta es mi página web personal.</p>

    <p>Me gusta el arte, la música y aprender cosas nuevas todos los días.</p>

  </body>
</html>
