<!DOCTYPE html>
<html>
  <head>
    <!-- title define el texto que aparece en la pestaña del navegador -->
    <title>Mi primera página - Ana García</title>
  </head>
  <body>

    <!-- h1 es el encabezado principal, solo debe haber uno por página -->
    <h1>Hola, soy Ana García</h1>

    <!-- p es un párrafo de texto normal -->
    <p>Estoy en tercer año de secundaria.</p>

    <!-- Los comentarios no se muestran en pantalla, solo en el código -->
    <!-- ¡Esto de HTML es genial! -->

  </body>
</html>
