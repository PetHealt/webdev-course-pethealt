<!DOCTYPE html>
<html>
    <head>
        <title>Mis Intereses - Carlos Ruiz</title>
    </head>

    <body>

        <!-- h1: encabezado principal con el nombre -->
        <h1>Soy Carlos Ruiz</h1>

        <!-- h2: subtítulo de sección, más pequeño que h1 -->
        <h2>Sobre mí</h2>

        <!-- p: párrafo de texto descriptivo -->
        <p>Tengo 15 años y me encanta la música y los videojuegos. Estudio en Lima.</p>

        <h2>Mis intereses</h2>

        <!-- ul: lista sin orden, los elementos van con viñetas -->
    <ul>
        <!-- li: cada elemento de la lista -->
        <li>Fútbol</li>
        <li>Música</li>
        <li>Programación</li>
    </ul>

        <!-- img: muestra una imagen. src es la ruta, alt es la descripción -->
        <img src="https://via.placeholder.com/300" alt="Foto de Carlos">

        <!-- a: enlace. href es la dirección. target="_blank" abre en nueva pestaña -->
        <a href="https://youtube.com" target="_blank">Mi canal favorito de YouTube</a>

    </body>
</html>
