<!DOCTYPE html>
<html>
    <head>
        <!-- 1. Cambia el título por "Mi Perfil - [tu nombre]" -->
        <title>Mi Perfil</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

    <div class="perfil">

        <div class="encabezado">
            <!-- 2. Reemplaza la URL de src por una foto tuya o deja el placeholder -->
            <!--    No olvides actualizar el texto del atributo alt -->
            <img src="https://via.placeholder.com/120" alt="Foto de perfil">

            <!-- 3. Reemplaza "Tu Nombre" con tu nombre real -->
            <h1>Tu Nombre</h1>

            <!-- 4. Reemplaza el subtítulo con tu descripción breve -->
            <p class="subtitulo">Estudiante · Apasionado/a de la tecnología</p>
        </div>

    <div class="seccion">
        <h2>Sobre mí</h2>
        <!-- 5. Escribe 2 o 3 oraciones sobre ti -->
        <p>Escribe aquí tu descripción personal.</p>
    </div>

    <div class="seccion">
        <h2>Mis intereses</h2>
        <!-- 6. Reemplaza los <li> con tus intereses reales, puedes agregar más -->
        <ul>
            <li>Interés 1</li>
            <li>Interés 2</li>
            <li>Interés 3</li>
        </ul>
    </div>

    <div class="seccion">
        <h2>Mis enlaces</h2>
        <!-- 7. Actualiza los href con tus enlaces reales y cambia el texto visible -->
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
    </div>

    </div>

    <!-- Ahora abre styles.css y completa el reto desde ahí -->

    </body>
</html>
